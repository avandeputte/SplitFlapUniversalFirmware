; ─────────────────────────────────────────────────────────────────────────────
;  PlatformIO configuration for the Split-Flap Universal Firmware
;  Target: ATtiny1616 on megaTinyCore, flashed over SerialUPDI.
;
;  This mirrors the Arduino IDE Tools menu settings:
;    Board                  ATtiny1616
;    Clock                  10 MHz internal
;    BOD mode active/sleep  Disabled / Disabled
;    BOD voltage level      1.8 V
;    Save EEPROM            EEPROM retained   ← preserves ID/calibration on reflash
;    UPDI/Reset pin         UPDI (no reset pin)
;    WDT timeout (fuse)     Disabled          ← firmware enables the WDT at runtime
;    millis()/micros()      Enabled (default timer)
;    printf()               Default (no float)
;    Programmer             SerialUPDI - SLOW: 57600 baud
;
;  Fuse-level options (BOD, EEPROM-retain, UPDI pin, WDT, clock) are written when
;  you run the "fuses" / "bootloader" target — the equivalent of "Burn Bootloader"
;  in the IDE.  Do that ONCE per chip before the first upload so EEPROM is retained
;  on every subsequent flash.
;
;  Common targets:
;    pio run                         build
;    pio run -t upload               build + flash over SerialUPDI
;    pio run -t fuses                write fuses (BOD / EEPROM-retain / UPDI / clock)
;    pio run -t bootloader           write fuses (same as fuses for UPDI parts)
; ─────────────────────────────────────────────────────────────────────────────

[env:ATtiny1616]
platform        = atmelmegaavr
framework       = arduino
board           = ATtiny1616

; ── Clock: 10 MHz internal ───────────────────────────────────────────────────
; board_build.f_cpu sets the compiled-for frequency; the matching internal
; oscillator fuse is written by the "fuses" target.
board_build.f_cpu       = 10000000L
board_hardware.oscillator = internal

; ── BOD: disabled, 1.8 V level ───────────────────────────────────────────────
; "Disabled/Disabled" in the IDE means BOD is off in both active and sleep modes.
; The 1.8 V level is still written so it is defined if BOD is ever enabled.
board_hardware.bod      = disabled

; ── UPDI/Reset pin: keep as UPDI (no reset pin) ──────────────────────────────
; Leaves the UPDI pin available for programming; does NOT repurpose it as reset
; or GPIO.  Matches "UPDI (no reset pin)".
board_hardware.updipin  = updi

; ── Watchdog fuse: disabled ──────────────────────────────────────────────────
; The IDE setting is "Disabled (recommended)".  The firmware enables the watchdog
; itself at runtime via wdt_enable(WDT_TIMEOUT), which is the intended design, so
; the fuse must NOT force-enable it.
board_hardware.wdt      = disabled

; ── EEPROM retained across uploads (the important one) ───────────────────────
; "EEPROM retained" keeps each module's ID, calibration, flap map, and the
; auto-detected Hall polarity / step count through a reflash.  Without this a
; flash wipes EEPROM and the module reverts to unprovisioned defaults.
; This is a FUSE setting: it only takes effect after the "fuses"/"bootloader"
; target is run once per chip.
board_hardware.eesave   = yes

; ── Upload: SerialUPDI at 57600 baud (matches the IDE's "SLOW" profile) ───────
upload_protocol        = serialupdi
upload_port            = /dev/cu.usbserial-11430
upload_speed           = 57600
; If "UPDI link initialization failed" ever appears, check target POWER first
; (the SerialUPDI adapter does not power the board), then wiring, then try a
; lower baud rate (e.g. 28800) as the avrdude error suggests.

; ── Serial monitor (optional convenience) ────────────────────────────────────
; The RS-485 bus runs at 9600 baud via SoftwareSerial; if you wire a monitor to
; the same line, match that speed.
monitor_port           = /dev/cu.usbserial-11430
monitor_speed          = 9600

; ── Build / source layout ────────────────────────────────────────────────────
; IMPORTANT: PlatformIO compiles sources from src/.  Use the .cpp version of the
; firmware, NOT the .ino:
;
;     <project>/
;       platformio.ini
;       src/
;         SplitFlapUniversalFirmware.cpp
;
; Why .cpp and not .ino: PlatformIO's .ino-to-.cpp preprocessor mis-parses the
; single quotes in this firmware's comments (e.g. run 'T' first) and fails with a
; spurious  "'T' does not name a type"  error pointing at a comment line.  The
; .cpp build skips that preprocessor entirely.  The .cpp is identical to the .ino
; except it adds  #include <Arduino.h>  and an explicit block of forward
; declarations (the .ino auto-prototype step does this implicitly).  Keep editing
; whichever file you prefer, but build the .cpp here.

; ── Code size (matches the IDE's flash usage) ────────────────────────────────
; The firmware uses snprintf().  avr-libc has three printf/scanf variants; the
; full one is large.  The Arduino IDE's  printf(): "Default (no floats, 1.4k)"
; selects the MINIMAL integer-only variant via a linker flag.  PlatformIO does
; NOT do this by default and links the full printf, which is bigger and can push
; the firmware over the ATtiny1616's 16 KB flash (the "region `text' overflowed"
; link error).  -lprintf_min selects the same minimal variant the IDE uses.
;
; -Os and -flto further match the IDE's size-optimised build.  If you ever need
; the float-capable printf, swap -lprintf_min for -lprintf_flt (much larger).
build_flags            =
    -Os
    -flto
    -Wl,-u,vfprintf
    -lprintf_min

; If, after the above, it STILL overflows, the cause is the board's flash-region
; definition reserving space for a (nonexistent, for UPDI) bootloader.  In that
; case uncomment the line below to reclaim the full 16 KB for code:
; board_upload.maximum_size = 16384
